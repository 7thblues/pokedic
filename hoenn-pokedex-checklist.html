<style>

.stats { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
.pill { display:inline-flex; align-items:center; gap:5px; padding:4px 8px; border-radius:999px; background:var(--card); border:1px solid var(--line); color:var(--muted); font-size:12px; }

th:nth-child(4), td:nth-child(4) { position:sticky; left:258px; z-index:12; width:150px; min-width:150px; max-width:150px; box-shadow:8px 0 14px rgba(65,42,20,.08); }
td:nth-child(1), td:nth-child(2), td:nth-child(3), td:nth-child(4) { background:#fffef8; }

tr.caught td { background:#e8f4e8; color:#4f6758; }
tr.caught.partial td { background:#fff7df; color:#6a5630; }
tr.caught td:nth-child(1), tr.caught td:nth-child(2), tr.caught td:nth-child(3), tr.caught td:nth-child(4) { background:#e8f4e8; }
tr.caught.partial td:nth-child(1), tr.caught.partial td:nth-child(2), tr.caught.partial td:nth-child(3), tr.caught.partial td:nth-child(4) { background:#fff7df; }

.version-checks { display:grid; gap:4px; }
.version-check { display:flex; align-items:center; gap:4px; font-size:11px; font-weight:900; line-height:1; }
.version-check.ruby { color:var(--ruby); }
.version-check.sapphire { color:var(--sapphire); }

.num { font-variant-numeric:tabular-nums; color:var(--muted); font-weight:700; white-space:nowrap; }
.sprite-cell { width:58px; text-align:center; }
.sprite { width:48px; height:48px; object-fit:contain; image-rendering:pixelated; filter:drop-shadow(0 2px 0 rgba(60,45,25,.12)); }
.name { font-weight:800; letter-spacing:-.01em; }
.pokemon-move-link { color:inherit; text-decoration:none; display:inline-grid; gap:2px; border-radius:12px; padding:3px 6px; margin:-3px -6px; transition:background .14s ease, box-shadow .14s ease, transform .14s ease; }
.pokemon-move-link:hover { background:#eef4e7; box-shadow:0 8px 18px rgba(47,111,78,.14); transform:translateY(-1px); }

.type { display:inline-block; margin:0 4px 4px 0; padding:3px 8px; border-radius:999px; border:1px solid rgba(33,27,22,.18); color:#fff; font-size:12px; font-weight:800; line-height:1.2; text-shadow:0 1px 0 rgba(0,0,0,.35); box-shadow:inset 0 1px 0 rgba(255,255,255,.28); }

.type-ice { background:linear-gradient(#a9e6e6,#5fbac0); color:#153a40; text-shadow:0 1px 0 rgba(255,255,255,.45); }
.type-fighting { background:linear-gradient(#d46a58,#8f2f23); }
.type-poison { background:linear-gradient(#bd6ac8,#8f3e9f); }
.type-ground { background:linear-gradient(#e6cf78,#b89237); color:#30220f; text-shadow:0 1px 0 rgba(255,255,255,.35); }
.type-flying { background:linear-gradient(#b7a7f0,#7962c6); }
.type-psychic { background:linear-gradient(#f47aa0,#d93b72); }
.type-bug { background:linear-gradient(#b9c94a,#83901f); }
.type-rock { background:linear-gradient(#c8ad58,#8c7430); }
.type-ghost { background:linear-gradient(#806fae,#54427f); }
.type-dragon { background:linear-gradient(#8b73f0,#5135c8); }
.type-dark { background:linear-gradient(#806856,#4d3d33); }
.type-steel { background:linear-gradient(#d0d0e0,#9090aa); color:#242433; text-shadow:0 1px 0 rgba(255,255,255,.35); }
.version { white-space:nowrap; }
.version-pill { display:inline-flex; align-items:center; justify-content:center; min-width:72px; padding:4px 9px; border-radius:999px; font-size:12px; font-weight:950; letter-spacing:-.02em; box-shadow:inset 0 1px 0 rgba(255,255,255,.28); }
.version-pill.ruby.exclusive { background:linear-gradient(#d84b56,#9f1b25); color:white; }
.version-pill.sapphire.exclusive { background:linear-gradient(#4e91df,#194f9a); color:white; }
.version-pill.ruby.easier { background:#fff0f1; color:var(--ruby); border:1px solid rgba(181,31,42,.34); }
.version-pill.sapphire.easier { background:#eef6ff; color:var(--sapphire); border:1px solid rgba(29,94,170,.34); }
.version-pill.common { background:#e8f4e8; color:#2e7d54; border:1px solid rgba(46,125,84,.24); }
.version-pill.special { background:#fff3d8; color:#9a6414; border:1px solid rgba(177,120,22,.28); }
.matchups { min-width:300px; }
.matchup-flow { display:grid; gap:7px; padding:8px; border:1px solid var(--line); border-radius:12px; background:#fffdf8; }
.matchup-row { display:flex; align-items:center; gap:8px; min-height:28px; }
.matchup-row-label { width:56px; flex:0 0 auto; font-size:11px; font-weight:900; letter-spacing:-.02em; color:var(--muted); }

.matchup-icons { display:flex; align-items:center; gap:7px; flex-wrap:wrap; }

.matchup-line:last-child { margin-bottom:0; }
.matchup-tags { display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
.arrow { color:var(--muted); font-weight:800; }
.mult { color:var(--muted); font-size:11px; font-weight:800; margin-left:-2px; }
.type.mini { padding:2px 6px; font-size:11px; }
.type-icon-wrap { position:relative; display:inline-flex; width:26px; height:26px; align-items:center; justify-content:center; flex:0 0 auto; border-radius:999px; cursor:help; z-index:1; }
.type-icon-wrap:hover { z-index:120; }
.type-icon { width:22px; height:22px; vertical-align:middle; filter:drop-shadow(0 1px 1px rgba(33,27,22,.18)); }
.type-icon-wrap::before { content:''; position:absolute; left:50%; bottom:calc(100% + 3px); transform:translateX(-50%) translateY(4px); border:5px solid transparent; border-top-color:#211b16; opacity:0; pointer-events:none; transition:opacity .12s ease, transform .12s ease; z-index:30; }
.type-icon-wrap::after { content:attr(data-type); position:absolute; left:50%; bottom:calc(100% + 12px); transform:translateX(-50%) translateY(4px); padding:5px 8px; border-radius:999px; background:#211b16; color:#fffdf8; box-shadow:0 6px 18px rgba(33,27,22,.18); font-size:11px; font-weight:850; letter-spacing:-.01em; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity .12s ease, transform .12s ease; z-index:80; }
.type-icon-wrap:hover::before, .type-icon-wrap:hover::after { opacity:1; transform:translateX(-50%) translateY(0); }
.type-icon-wrap::marker { content:none; }
.type-icon-wrap[data-mult]::after { content:attr(data-type) ' · ' attr(data-mult); }
.type-icon-wrap[data-badge]::before { content:attr(data-badge); left:auto; right:-6px; bottom:-5px; transform:none; display:flex; width:15px; height:15px; align-items:center; justify-content:center; border:0; border-radius:999px; color:white; font-size:8px; font-weight:950; letter-spacing:-.05em; opacity:1; z-index:1; transition:none; }
.type-icon-wrap[data-badge]:hover::before { transform:none; }
.type-icon-wrap.weak-x4 { width:30px; height:30px; background:#fff1ec; outline:2px solid #c42c1f; outline-offset:2px; box-shadow:0 0 0 5px rgba(196,44,31,.12), 0 4px 14px rgba(196,44,31,.22); }
.type-icon-wrap.weak-x4::before { background:#c42c1f; }
.type-icon-wrap.weak-x2 { background:#fff4df; outline:2px solid #e17b2d; outline-offset:1px; box-shadow:0 2px 9px rgba(225,123,45,.18); }
.type-icon-wrap.weak-x2::before { background:#e17b2d; }
.type-icon-wrap.resist { opacity:.78; background:#eef7ef; box-shadow:inset 0 0 0 1px rgba(51,115,67,.24); }

.type-icon-wrap.immune[data-badge]::before { background:#211b16; color:#fffdf8; }
.type.weak-x4 { outline:2px solid #c42c1f; outline-offset:1px; }
.type.weak-x2 { outline:1px solid rgba(33,27,22,.2); }
.base-stat-cell { min-width:210px; }
.base-stats { display:grid; grid-template-columns:repeat(3, minmax(66px, auto)); gap:5px; }
.stat-chip { position:relative; display:inline-flex; align-items:center; justify-content:space-between; gap:5px; padding:3px 6px; border-radius:999px; background:#fffdf8; border:1px solid rgba(33,27,22,.14); font-size:11px; font-weight:850; cursor:help; }
.stat-chip::after { content:attr(data-stat); position:absolute; left:50%; bottom:calc(100% + 8px); transform:translateX(-50%) translateY(4px); padding:5px 8px; border-radius:999px; background:#211b16; color:#fffdf8; box-shadow:0 6px 18px rgba(33,27,22,.18); white-space:nowrap; opacity:0; pointer-events:none; transition:opacity .12s ease, transform .12s ease; z-index:32; }

.version-note { display:block; margin-top:5px; }

.note-nav { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin:0 0 10px; padding:5px 8px; border:1px solid var(--line); border-radius:999px; background:rgba(255,253,248,.82); box-shadow:0 8px 18px rgba(42,60,35,.07); } .nav-links { display:flex; gap:6px; flex-wrap:wrap; align-items:center; } .note-nav .stats { margin-left:auto; } .note-nav a { display:inline-flex; align-items:center; gap:6px; padding:5px 10px; border-radius:999px; color:var(--muted); text-decoration:none; font-size:13px; font-weight:900; transition:background .14s ease, color .14s ease, transform .14s ease; } .note-nav a:hover { background:#eef4e7; color:var(--ink); transform:translateY(-1px); } .note-nav a.active { background:var(--leaf); color:white; }

</style>

    tr.className = isCaught ? 'caught' : isPartialCaught ? 'caught partial' : '';
    tr.innerHTML = '<td><div class="version-checks"><label class="version-check ruby"><input class="check" type="checkbox" ' + (isRubyCaught ? 'checked ' : '') + 'data-version="ruby" data-no="' + p.no + '">R</label><label class="version-check sapphire"><input class="check" type="checkbox" ' + (isSapphireCaught ? 'checked ' : '') + 'data-version="sapphire" data-no="' + p.no + '">S</label></div></td>' +
      '<td class="num">#' + String(p.no).padStart(3, '0') + '</td>' +
      '<td class="sprite-cell"><img class="sprite" src="' + esc(p.img) + '" alt="" loading="lazy"></td>' +
      '<td><a class="pokemon-move-link" href="ruby-sapphire-move-guide.html#pokemon-' + encodeURIComponent(p.name) + '" title="기술 목록 보기"><span class="name">' + esc(p.name) + '</span><span class="small">' + esc(p.nameKo || '') + '</span></a></td>' +
      '<td>' + p.types.map(t => typeBadge(t)).join('') + '</td>' +
      '<td class="base-stat-cell">' + statsHtml(p.stats) + '</td>' +
      '<td class="matchups">' + matchupGridHtml(p) + '</td>' +
      '<td class="version">' + versionPill(shownVersionInfo) + '</td>' +
      '<td class="obtain">' + obtainHtml(p) + '</td>';
    body.appendChild(tr);
  }
  rubyCaughtCount.textContent = 'R ' + caught.ruby.size + ' / ' + DEX.length;
  sapphireCaughtCount.textContent = 'S ' + caught.sapphire.size + ' / ' + DEX.length;
  visibleCount.textContent = shown + ' shown';
}
body.addEventListener('change', e => {
  if (!e.target.matches('.check')) return;
  const no = Number(e.target.dataset.no);
  const version = e.target.dataset.version;
  if (!caught[version]) return;
  if (e.target.checked) caught[version].add(no); else caught[version].delete(no);
  save();
  render();
});
for (const el of [search, caughtFilter, typeFilter]) el.addEventListener('input', render);
versionFilter.addEventListener('click', e => {
  const btn = e.target.closest('.version-filter-btn');
  if (!btn) return;
  btn.classList.toggle('active');
  render();
});
document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Ruby/Sapphire 체크 상태를 모두 지울까요?')) {
    caught.ruby.clear();
    caught.sapphire.clear();
    save();
    render();
  }
});
render();
</script>
</body>
</html>
